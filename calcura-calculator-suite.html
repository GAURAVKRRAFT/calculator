<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Calcura — Premium Calculator Suite</title>
<style>
/* ============================================================
   1. DESIGN TOKENS / THEME
   ============================================================ */
:root{
  --bg:#eef1f6; --bg2:#e4e9f2; --panel:rgba(255,255,255,0.55); --panel-solid:#ffffff;
  --panel-border:rgba(255,255,255,0.6); --text:#1b2333; --text-dim:#5b647a;
  --accent:#5865f2; --accent2:#00c2a8; --danger:#ef4b6a; --warn:#f6a723; --good:#1fbf75;
  --shadow:0 8px 30px rgba(30,41,59,0.10); --shadow-sm:0 2px 10px rgba(30,41,59,0.08);
  --radius:20px; --radius-sm:12px; --nsh-light:#ffffff; --nsh-dark:#c7cedb;
  --grad: linear-gradient(135deg,#5865f2,#00c2a8);
  --speed:.35s;
}
[data-theme="dark"]{
  --bg:#0e1220; --bg2:#141a2c; --panel:rgba(28,33,54,0.55); --panel-solid:#171d30;
  --panel-border:rgba(255,255,255,0.08); --text:#e7ebf5; --text-dim:#8b93ad;
  --accent:#7c8bff; --accent2:#2fe0c4; --shadow:0 8px 30px rgba(0,0,0,0.45); --shadow-sm:0 2px 10px rgba(0,0,0,0.35);
  --nsh-light:#1d2338; --nsh-dark:#0a0d18;
}
*,*::before,*::after{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:
    radial-gradient(1200px 700px at 90% -10%, rgba(88,101,242,0.12), transparent 60%),
    radial-gradient(1000px 600px at -10% 110%, rgba(0,194,168,0.12), transparent 60%),
    var(--bg);
  color:var(--text); transition:background var(--speed), color var(--speed);
  overflow-x:hidden;
}
.reduced-motion *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
::selection{background:var(--accent); color:#fff;}
a{color:inherit;}
button{font-family:inherit;}
input,select{font-family:inherit;}

/* Scrollbars */
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--panel-border); border-radius:10px;}
::-webkit-scrollbar-track{background:transparent;}

/* ============================================================
   2. LAYOUT
   ============================================================ */
.app{ display:grid; grid-template-columns:280px 1fr; min-height:100vh;}
.sidebar{
  position:sticky; top:0; height:100vh; overflow-y:auto;
  background:var(--panel); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-right:1px solid var(--panel-border); padding:20px 14px 40px; z-index:40;
  transition:transform var(--speed);
}
.brand{display:flex; align-items:center; gap:10px; padding:6px 8px 18px; }
.brand svg{width:34px;height:34px;flex-shrink:0;}
.brand-name{font-weight:800; font-size:19px; letter-spacing:.2px;}
.brand-sub{font-size:11px; color:var(--text-dim); margin-top:-2px;}

.search-box{position:relative; margin-bottom:14px;}
.search-box input{
  width:100%; padding:11px 14px 11px 38px; border-radius:var(--radius-sm); border:1px solid var(--panel-border);
  background:var(--panel-solid); color:var(--text); font-size:13.5px; outline:none;
  box-shadow:var(--shadow-sm); transition:box-shadow .2s, transform .2s;
}
.search-box input:focus{box-shadow:0 0 0 3px rgba(88,101,242,.25);}
.search-box svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); width:15px;height:15px; opacity:.55;}

.nav-group{margin-bottom:6px;}
.nav-group-title{
  font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim);
  padding:14px 10px 6px; font-weight:700;
}
.nav-item{
  display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:12px; cursor:pointer;
  font-size:13.5px; color:var(--text-dim); transition:background .18s, color .18s, transform .15s; user-select:none;
  position:relative; overflow:hidden;
}
.nav-item:hover{background:rgba(88,101,242,.08); color:var(--text); transform:translateX(2px);}
.nav-item.active{background:var(--grad); color:#fff; box-shadow:var(--shadow-sm);}
.nav-item .ic{width:17px;height:17px;flex-shrink:0; opacity:.9;}
.nav-item .star{margin-left:auto; width:14px;height:14px; opacity:.5; cursor:pointer;}
.nav-item .star.fav{opacity:1; color:var(--warn);}
.hidden{display:none !important;}

.main{padding:22px 26px 60px; min-width:0;}
.topbar{
  display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:18px; flex-wrap:wrap;
}
.hamburger{display:none; width:40px;height:40px;border-radius:12px;border:1px solid var(--panel-border); background:var(--panel-solid); align-items:center; justify-content:center; cursor:pointer; box-shadow:var(--shadow-sm);}
.hamburger span{display:block; width:18px; height:2px; background:var(--text); position:relative;}
.hamburger span::before,.hamburger span::after{content:'';position:absolute;left:0;width:18px;height:2px;background:var(--text);}
.hamburger span::before{top:-6px;} .hamburger span::after{top:6px;}

.title-block h1{font-size:23px; margin:0; font-weight:800;}
.title-block p{margin:2px 0 0; font-size:13px; color:var(--text-dim);}

.top-actions{display:flex; align-items:center; gap:10px;}
.icon-btn{
  width:40px;height:40px;border-radius:12px;border:1px solid var(--panel-border); background:var(--panel-solid);
  display:flex;align-items:center;justify-content:center; cursor:pointer; box-shadow:var(--shadow-sm); color:var(--text);
  transition:transform .15s, box-shadow .15s;
}
.icon-btn:hover{transform:translateY(-2px); box-shadow:var(--shadow);}
.icon-btn svg{width:18px;height:18px;}

/* Panels / Cards */
.view{display:none; animation:fadeUp .38s ease;}
.view.active{display:block;}
@keyframes fadeUp{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}

.grid{display:grid; gap:18px;}
.grid.cols-2{grid-template-columns:1.1fr .9fr;}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
@media (max-width:980px){ .grid.cols-2,.grid.cols-3{grid-template-columns:1fr;} }

.card{
  background:var(--panel); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border:1px solid var(--panel-border); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow);
  transition:transform .25s, box-shadow .25s;
}
.card:hover{ }
.card h2{margin:0 0 14px; font-size:16px; font-weight:800;}
.card h3{margin:18px 0 8px; font-size:13px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:.05em;}

.field{margin-bottom:14px;}
.field label{display:block; font-size:12.5px; color:var(--text-dim); margin-bottom:6px; font-weight:600;}
.field .row{display:flex; gap:8px;}
.input, select.input{
  width:100%; padding:11px 13px; border-radius:12px; border:1px solid var(--panel-border);
  background:var(--panel-solid); color:var(--text); font-size:14.5px; outline:none;
  transition:box-shadow .2s, border-color .2s;
}
.input:focus{box-shadow:0 0 0 3px rgba(88,101,242,.22); border-color:var(--accent);}
.input.error{border-color:var(--danger); animation:shake .35s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
.error-msg{color:var(--danger); font-size:12px; margin-top:5px; display:none;}
.error-msg.show{display:block;}

input[type=range]{-webkit-appearance:none; width:100%; height:6px; border-radius:6px; background:var(--panel-border); outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:18px;height:18px;border-radius:50%; background:var(--grad); cursor:pointer; box-shadow:0 2px 8px rgba(88,101,242,.5);}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%; background:var(--grad); border:none; cursor:pointer;}

.btn{
  padding:11px 18px; border-radius:12px; border:none; background:var(--grad); color:#fff; font-weight:700; font-size:13.5px;
  cursor:pointer; box-shadow:var(--shadow-sm); position:relative; overflow:hidden; transition:transform .15s, box-shadow .15s;
}
.btn:hover{transform:translateY(-2px); box-shadow:var(--shadow);}
.btn.secondary{background:var(--panel-solid); color:var(--text); border:1px solid var(--panel-border);}
.btn.small{padding:7px 12px; font-size:12px; border-radius:9px;}
.btn.block{width:100%;}
.ripple{position:absolute; border-radius:50%; background:rgba(255,255,255,.55); transform:scale(0); animation:ripple .6s linear; pointer-events:none;}
@keyframes ripple{to{transform:scale(3); opacity:0;}}

.result-box{
  margin-top:6px; padding:18px; border-radius:16px; background:var(--grad); color:#fff; text-align:center;
  box-shadow:var(--shadow);
}
.result-box .big{font-size:28px; font-weight:800; letter-spacing:.2px;}
.result-box .cap{font-size:11.5px; opacity:.85; text-transform:uppercase; letter-spacing:.08em; margin-top:2px;}

.summary-table{width:100%; border-collapse:collapse; font-size:13px; margin-top:10px;}
.summary-table td{padding:8px 4px; border-bottom:1px solid var(--panel-border);}
.summary-table td:last-child{text-align:right; font-weight:700;}

.tag{display:inline-flex; align-items:center; gap:5px; font-size:11px; padding:4px 9px; border-radius:20px; background:rgba(88,101,242,.12); color:var(--accent); font-weight:700;}
.badge-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;}

canvas.chart{width:100%; height:220px; border-radius:14px;}

/* Standard/Scientific Calculator */
.calc-wrap{display:grid; grid-template-columns:1fr 300px; gap:18px;}
@media (max-width:980px){.calc-wrap{grid-template-columns:1fr;}}
.display{
  background:var(--panel-solid); border:1px solid var(--panel-border); border-radius:18px; padding:20px;
  text-align:right; margin-bottom:14px; box-shadow:inset 0 2px 8px rgba(0,0,0,0.04);
}
.display .expr{min-height:20px; color:var(--text-dim); font-size:14px; word-break:break-all;}
.display .val{font-size:34px; font-weight:800; word-break:break-all; min-height:42px;}
.mode-row{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
.pillgroup{display:flex; background:var(--panel-solid); border:1px solid var(--panel-border); border-radius:12px; padding:3px; gap:2px;}
.pill{padding:6px 12px; border-radius:9px; font-size:12px; font-weight:700; cursor:pointer; color:var(--text-dim);}
.pill.active{background:var(--grad); color:#fff;}

.keys{display:grid; grid-template-columns:repeat(5,1fr); gap:8px;}
.keys.basic{grid-template-columns:repeat(4,1fr);}
.key{
  padding:15px 0; border-radius:14px; border:1px solid var(--panel-border); background:var(--panel-solid);
  font-size:16px; font-weight:700; cursor:pointer; color:var(--text); box-shadow:var(--shadow-sm); position:relative; overflow:hidden;
  transition:transform .12s, box-shadow .12s;
}
.key:hover{transform:translateY(-2px);}
.key:active{transform:scale(.95);}
.key.op{background:var(--grad); color:#fff;}
.key.fn{font-size:12.5px; background:rgba(88,101,242,.1); color:var(--accent);}
.key.eq{background:linear-gradient(135deg,var(--good),#0ea56b); color:#fff;}
.key.wide{grid-column:span 2;}

.history-panel{max-height:640px; overflow-y:auto;}
.hist-item{padding:10px 12px; border-radius:12px; background:var(--panel-solid); border:1px solid var(--panel-border); margin-bottom:8px; cursor:pointer; transition:transform .15s;}
.hist-item:hover{transform:translateX(3px);}
.hist-item .e{font-size:12px; color:var(--text-dim);}
.hist-item .r{font-size:16px; font-weight:800;}
.empty-note{color:var(--text-dim); font-size:13px; text-align:center; padding:30px 10px;}

/* Converters */
.conv-io{display:grid; grid-template-columns:1fr auto 1fr; gap:12px; align-items:end;}
.conv-swap{width:42px;height:42px;border-radius:50%; border:1px solid var(--panel-border); background:var(--panel-solid); cursor:pointer; display:flex;align-items:center;justify-content:center; box-shadow:var(--shadow-sm); transition:transform .3s;}
.conv-swap:hover{transform:rotate(180deg);}

.currency-list{max-height:340px; overflow-y:auto; margin-top:10px;}
.currency-row{display:flex; align-items:center; gap:10px; padding:9px 6px; border-bottom:1px solid var(--panel-border); font-size:13px;}
.currency-row input.rate{width:90px; padding:6px 8px; border-radius:8px; border:1px solid var(--panel-border); background:var(--panel-solid); color:var(--text); font-size:12.5px;}
.currency-row .code{font-weight:800; width:48px;}
.currency-row .fav{cursor:pointer; opacity:.4; margin-left:auto;}
.currency-row .fav.on{opacity:1; color:var(--warn);}

/* toast */
.toast-wrap{position:fixed; bottom:20px; right:20px; z-index:200; display:flex; flex-direction:column; gap:8px;}
.toast{background:var(--panel-solid); border:1px solid var(--panel-border); box-shadow:var(--shadow); padding:12px 16px; border-radius:12px; font-size:13px; display:flex; align-items:center; gap:8px; animation:toastIn .3s ease;}
.toast.success{border-left:4px solid var(--good);}
.toast.error{border-left:4px solid var(--danger);}
@keyframes toastIn{from{opacity:0; transform:translateX(30px);} to{opacity:1;transform:translateX(0);}}

footer.printonly{display:none;}
@media print{
  .sidebar,.topbar,.top-actions,.no-print{display:none !important;}
  .app{grid-template-columns:1fr;}
  body{background:#fff; color:#000;}
  .card{box-shadow:none; border:1px solid #ccc;}
}

@media (max-width:900px){
  .app{grid-template-columns:1fr;}
  .sidebar{position:fixed; left:0; top:0; width:280px; transform:translateX(-105%); box-shadow:var(--shadow);}
  .sidebar.open{transform:translateX(0);}
  .hamburger{display:flex;}
  .overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:30;}
  .overlay.show{display:block;}
}
@media (prefers-reduced-motion: reduce){ *{animation-duration:.001ms !important; transition-duration:.001ms !important;} }
</style>
</head>
<body>
<div class="overlay" id="overlay"></div>
<div class="app">

  <!-- ============================================================
       SIDEBAR
  ============================================================ -->
  <aside class="sidebar" id="sidebar" aria-label="Calculator navigation">
    <div class="brand">
      <svg viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="11" fill="url(#g)"/><path d="M12 14h16M12 20h16M12 26h9" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/><defs><linearGradient id="g" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#5865f2"/><stop offset="1" stop-color="#00c2a8"/></linearGradient></defs></svg>
      <div><div class="brand-name">Calcura</div><div class="brand-sub">Premium Calculator Suite</div></div>
    </div>

    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" id="globalSearch" placeholder="Search calculators…" autocomplete="off">
    </div>

    <nav id="navTree"></nav>
  </aside>

  <!-- ============================================================
       MAIN
  ============================================================ -->
  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="hamburger" id="hamburger" aria-label="Toggle menu"><span></span></button>
        <div class="title-block">
          <h1 id="viewTitle">Standard Calculator</h1>
          <p id="viewSub">Fast, precise everyday arithmetic</p>
        </div>
      </div>
      <div class="top-actions no-print">
        <button class="icon-btn" id="printBtn" title="Print report"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/></svg></button>
        <button class="icon-btn" id="historyToggle" title="History"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg></button>
        <button class="icon-btn" id="themeToggle" title="Toggle theme"><svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></button>
      </div>
    </div>

    <div id="views"></div>
  </main>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
/* ==================================================================================
   CALCURA — PREMIUM CALCULATOR SUITE
   Single-file vanilla JS application. Sections are labeled below.
   ================================================================================== */

/* ---------------------------------------------------------------
   0. UTILITIES
--------------------------------------------------------------- */
const $ = (sel,root=document)=>root.querySelector(sel);
const $$ = (sel,root=document)=>Array.from(root.querySelectorAll(sel));
const fmt = (n,d=2)=>{
  if(n===null||n===undefined||isNaN(n)) return '—';
  return Number(n).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d});
};
const fmtInt = n=> Number(n).toLocaleString(undefined,{maximumFractionDigits:0});
const clamp=(v,a,b)=>Math.min(Math.max(v,a),b);
const uid=()=>Math.random().toString(36).slice(2,9);

function toast(msg,type='success'){
  const wrap = $('#toastWrap');
  const el = document.createElement('div');
  el.className = 'toast '+type;
  el.innerHTML = (type==='success'?'✓ ':'⚠ ')+msg;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .3s'; el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 2600);
}

function attachRipple(el){
  el.addEventListener('click', function(e){
    const rect = this.getBoundingClientRect();
    const r = document.createElement('span');
    r.className='ripple';
    const size = Math.max(rect.width, rect.height);
    r.style.width = r.style.height = size+'px';
    r.style.left = (e.clientX-rect.left-size/2)+'px';
    r.style.top = (e.clientY-rect.top-size/2)+'px';
    this.appendChild(r);
    setTimeout(()=>r.remove(),650);
  });
}
function rippleAll(root=document){ $$('.key,.btn',root).forEach(attachRipple); }

function copyToClipboard(text){
  navigator.clipboard?.writeText(String(text)).then(()=>toast('Copied to clipboard')).catch(()=>toast('Copy failed','error'));
}

function downloadText(filename, content, mime='text/plain'){
  const blob = new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

function validateNumberInput(input, {min=-Infinity,max=Infinity,allowEmpty=false}={}){
  const errEl = input.parentElement.querySelector('.error-msg');
  const v = input.value.trim();
  input.classList.remove('error');
  if(errEl) errEl.classList.remove('show');
  if(v===''){ if(allowEmpty) return null; input.classList.add('error'); if(errEl){errEl.textContent='Required'; errEl.classList.add('show');} return NaN; }
  const n = parseFloat(v);
  if(isNaN(n) || n<min || n>max){
    input.classList.add('error');
    if(errEl){ errEl.textContent = isNaN(n) ? 'Enter a valid number' : `Must be between ${min} and ${max}`; errEl.classList.add('show'); }
    return NaN;
  }
  return n;
}

/* ---------------------------------------------------------------
   1. STORAGE / STATE
--------------------------------------------------------------- */
const Store = {
  key:'calcura_v1',
  data:{ theme:'auto', history:[], favorites:[], recents:[], currencyRates:null, reducedMotion:false },
  load(){
    try{
      const raw = localStorage.getItem(this.key);
      if(raw) Object.assign(this.data, JSON.parse(raw));
    }catch(e){}
  },
  save(){ try{ localStorage.setItem(this.key, JSON.stringify(this.data)); }catch(e){} },
  addHistory(entry){
    this.data.history.unshift({id:uid(), t:Date.now(), ...entry});
    this.data.history = this.data.history.slice(0,200);
    this.save(); renderHistory();
  },
  clearHistory(){ this.data.history=[]; this.save(); renderHistory(); },
  toggleFavorite(id){
    const i = this.data.favorites.indexOf(id);
    if(i>-1) this.data.favorites.splice(i,1); else this.data.favorites.push(id);
    this.save(); renderNav();
  },
  addRecent(id){
    this.data.recents = [id, ...this.data.recents.filter(x=>x!==id)].slice(0,5);
    this.save(); renderNav();
  }
};
Store.load();

/* ---------------------------------------------------------------
   2. THEME
--------------------------------------------------------------- */
function applyTheme(){
  const t = Store.data.theme;
  const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const effective = t==='auto' ? (sysDark?'dark':'light') : t;
  document.documentElement.setAttribute('data-theme', effective);
  $('#themeIcon').innerHTML = effective==='dark'
    ? '<path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/>'
    : '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
}
$('#themeToggle').addEventListener('click', ()=>{
  const order = ['auto','light','dark'];
  const cur = order.indexOf(Store.data.theme);
  Store.data.theme = order[(cur+1)%3];
  Store.save(); applyTheme();
  toast('Theme: '+Store.data.theme);
});
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) document.body.classList.add('reduced-motion');
applyTheme();

/* ---------------------------------------------------------------
   3. NAVIGATION DATA
--------------------------------------------------------------- */
const NAV = [
  {group:'Core', items:[
    {id:'standard', label:'Standard', sub:'Fast, precise everyday arithmetic', icon:'grid'},
    {id:'scientific', label:'Scientific', sub:'Trig, logs, powers & more', icon:'flask'},
  ]},

/* ---------------------------------------------------------------
   4. EXPRESSION ENGINE (shunting-yard) for Standard & Scientific calc
--------------------------------------------------------------- */
const MathEngine = (()=>{
  let angleMode = 'deg';
  function toRad(x){ return angleMode==='deg' ? x*Math.PI/180 : x; }
  function fromRad(x){ return angleMode==='deg' ? x*180/Math.PI : x; }
  function factorial(n){
    if(n<0 || Math.floor(n)!==n) return NaN;
    if(n>170) return Infinity;
    let r=1; for(let i=2;i<=n;i++) r*=i; return r;
  }
  const FUNCS = {
    sin:x=>Math.sin(toRad(x)), cos:x=>Math.cos(toRad(x)), tan:x=>Math.tan(toRad(x)),
    asin:x=>fromRad(Math.asin(x)), acos:x=>fromRad(Math.acos(x)), atan:x=>fromRad(Math.atan(x)),
    sinh:Math.sinh, cosh:Math.cosh, tanh:Math.tanh,
    asinh:Math.asinh, acosh:Math.acosh, atanh:Math.atanh,
    log:Math.log10, ln:Math.log, sqrt:Math.sqrt, cbrt:Math.cbrt,
    abs:Math.abs, exp:Math.exp, fact:factorial,
  };
  const CONSTS = { pi:Math.PI, e:Math.E };

  function tokenize(expr){
    const tokens = []; let i=0;
    expr = expr.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-').replace(/π/g,'pi');
    while(i<expr.length){
      const c = expr[i];
      if(/\s/.test(c)){ i++; continue; }
      if(/[0-9.]/.test(c)){
        let j=i; while(j<expr.length && /[0-9.eE]/.test(expr[j])){
          if((expr[j]==='e'||expr[j]==='E') && !/[0-9]/.test(expr[j+1]||'')) break;
          j++;
        }
        tokens.push({t:'num', v:parseFloat(expr.slice(i,j))}); i=j; continue;
      }
      if(/[a-zA-Z_]/.test(c)){
        let j=i; while(j<expr.length && /[a-zA-Z_0-9]/.test(expr[j])) j++;
        tokens.push({t:'id', v:expr.slice(i,j)}); i=j; continue;
      }
      if('+-*/^%(),!'.includes(c)){ tokens.push({t:'op', v:c}); i++; continue; }
      i++; // skip unknown char
    }
    return tokens;
  }

  function toPostfix(tokens){
    const out=[], ops=[];
    const prec = {'+':2,'-':2,'*':3,'/':3,'%':3,'^':4,'u-':5};
    const rightAssoc = {'^':true,'u-':true};
    let prevType=null;
    for(let k=0;k<tokens.length;k++){
      const tok = tokens[k];
      if(tok.t==='num'){ out.push(tok); prevType='num'; continue; }
      if(tok.t==='id'){
        if(CONSTS.hasOwnProperty(tok.v)){ out.push({t:'num', v:CONSTS[tok.v]}); prevType='num'; }
        else { ops.push({t:'func', v:tok.v}); prevType='func'; }
        continue;
      }
      if(tok.v==='('){ ops.push(tok); prevType='('; continue; }
      if(tok.v===')'){
        while(ops.length && ops[ops.length-1].v!=='(') out.push(ops.pop());
        ops.pop();
        if(ops.length && ops[ops.length-1].t==='func') out.push(ops.pop());
        prevType='num'; continue;
      }
      if(tok.v==='!'){ out.push({t:'postfix', v:'!'}); prevType='num'; continue; }
      if(tok.v==='-' && (prevType===null || prevType==='(' || prevType==='op')){
        ops.push({t:'op', v:'u-'}); prevType='op'; continue;
      }
      // binary operator
      const o1 = tok.v;
      while(ops.length){
        const top = ops[ops.length-1];
        if(top.t==='func'){ out.push(ops.pop()); continue; }
        if(top.v==='(') break;
        const p2 = prec[top.v]||0, p1=prec[o1]||0;
        if(p2>p1 || (p2===p1 && !rightAssoc[o1])) out.push(ops.pop()); else break;
      }
      ops.push({t:'op', v:o1}); prevType='op';
    }
    while(ops.length) out.push(ops.pop());
    return out;
  }

  function evalPostfix(pf){
    const st=[];
    pf.forEach(tok=>{
      if(tok.t==='num'){ st.push(tok.v); return; }
      if(tok.t==='postfix' && tok.v==='!'){ st.push(factorial(st.pop())); return; }
      if(tok.t==='func'){
        const a = st.pop();
        if(FUNCS[tok.v]) st.push(FUNCS[tok.v](a));
        else st.push(NaN);
        return;
      }
      if(tok.v==='u-'){ st.push(-st.pop()); return; }
      const b = st.pop(), a = st.pop();
      switch(tok.v){
        case '+': st.push(a+b); break;
        case '-': st.push(a-b); break;
        case '*': st.push(a*b); break;
        case '/': st.push(a/b); break;
        case '%': st.push(a%b); break;
        case '^': st.push(Math.pow(a,b)); break;
        default: st.push(NaN);
      }
    });
    return st.pop();
  }

  function evaluate(expr, mode){
    angleMode = mode || angleMode;
    if(!expr || !expr.trim()) return NaN;
    try{
      const tokens = tokenize(expr);
      const pf = toPostfix(tokens);
      const r = evalPostfix(pf);
      return r;
    }catch(e){ return NaN; }
  }
  return { evaluate, setAngleMode:(m)=>angleMode=m, getAngleMode:()=>angleMode };
})();

function drawBarChart(canvas, labels, values, opts={}){
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w*dpr; canvas.height = h*dpr; ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  const max = Math.max(...values, 1);
  const pad = 30, bw = (w-pad*2)/values.length*0.6, gap=(w-pad*2)/values.length;
  const styles = getComputedStyle(document.documentElement);
  const accent = styles.getPropertyValue('--accent').trim() || '#5865f2';
  const accent2 = styles.getPropertyValue('--accent2').trim() || '#00c2a8';
  const textc = styles.getPropertyValue('--text-dim').trim() || '#666';
  ctx.font='11px system-ui';
  values.forEach((v,i)=>{
    const bh = (h-50) * (v/max);
    const x = pad + i*gap + (gap-bw)/2;
    const y = h-30-bh;
    const grad = ctx.createLinearGradient(0,y,0,y+bh);
    grad.addColorStop(0,accent); grad.addColorStop(1,accent2);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(x,y,bw,bh,[6,6,0,0]) : ctx.rect(x,y,bw,bh);
    ctx.fill();
    ctx.fillStyle = textc;
    ctx.textAlign='center';
    ctx.fillText(labels[i], x+bw/2, h-14);
  });
}
function drawLineChart(canvas, labels, series, opts={}){
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w*dpr; canvas.height = h*dpr; ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  const styles = getComputedStyle(document.documentElement);
  const accent = styles.getPropertyValue('--accent').trim();
  const border = styles.getPropertyValue('--panel-border').trim();
  const textc = styles.getPropertyValue('--text-dim').trim();
  const pad=34;
  const allVals = series.flat();
  const max = Math.max(...allVals,1), min = Math.min(...allVals,0);
  ctx.strokeStyle = border; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y = pad + (h-pad-20)*i/4;
    ctx.beginPath(); ctx.moveTo(pad,y); ctx.lineTo(w-10,y); ctx.stroke();
  }
  const stepX = (w-pad-20)/(labels.length-1||1);
  ctx.strokeStyle = accent; ctx.lineWidth=2.5; ctx.beginPath();
  series.forEach((v,i)=>{
    const x = pad + i*stepX;
    const y = h-20 - (h-pad-20)*(v-min)/((max-min)||1);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();
  ctx.fillStyle = accent;
  series.forEach((v,i)=>{
    const x = pad + i*stepX;
    const y = h-20 - (h-pad-20)*(v-min)/((max-min)||1);
    ctx.beginPath(); ctx.arc(x,y,3,0,7); ctx.fill();
  });
  ctx.fillStyle = textc; ctx.font='10px system-ui'; ctx.textAlign='center';
  labels.forEach((l,i)=>{ if(i%Math.ceil(labels.length/8||1)===0) ctx.fillText(l, pad+i*stepX, h-4); });
}

const Std = (()=>{
  let expr = '', memory = 0;
  const exprEl = ()=>document.getElementById('stdExpr');
  const valEl = ()=>document.getElementById('stdVal');
  function updateDisplay(){
    exprEl().textContent = expr || '\u00A0';
    const r = MathEngine.evaluate(expr, 'deg');
    valEl().textContent = expr ? (isNaN(r) ? 'Error' : trimNum(r)) : '0';
  }
  function trimNum(n){
    if(!isFinite(n)) return n>0?'Infinity':'-Infinity';
    return Math.abs(n)<1e-10 && n!==0 ? n.toExponential(4) : String(Math.round(n*1e10)/1e10);
  }
  function press(k){
    if(k==='C'){ expr=''; updateDisplay(); return; }
    if(k==='back'){ expr = expr.slice(0,-1); updateDisplay(); return; }
    if(k==='='){
      if(!expr) return;
      const r = MathEngine.evaluate(expr,'deg');
      if(isNaN(r)){ valEl().textContent='Error'; valEl().style.color='var(--danger)'; setTimeout(()=>valEl().style.color='',600); return; }
      Store.addHistory({label:'Standard', expr, result: trimNum(r)});
      expr = trimNum(r); updateDisplay(); return;
    }
    if(k==='fact'){ expr += '!'; updateDisplay(); return; }
    if(k==='sqrt'){ expr += 'sqrt('; updateDisplay(); return; }
    if(k==='MC'){ memory=0; syncMem(); return; }
    if(k==='MR'){ expr += trimNum(memory); updateDisplay(); return; }
    if(k==='MS'){ memory = MathEngine.evaluate(expr,'deg')||0; syncMem(); return; }
    if(k==='M+'){ memory += (MathEngine.evaluate(expr,'deg')||0); syncMem(); return; }
    if(k==='M-'){ memory -= (MathEngine.evaluate(expr,'deg')||0); syncMem(); return; }
    expr += k; updateDisplay();
  }
  function syncMem(){ document.getElementById('memVal').textContent = trimNum(memory); }
  document.getElementById('view-standard').addEventListener('click', e=>{
    const btn = e.target.closest('.key'); if(!btn) return; press(btn.dataset.k);
  });
  document.addEventListener('keydown', e=>{
    if(currentView!=='standard') return;
    if(/[0-9.+\-*/()%]/.test(e.key)){ press(e.key); }
    else if(e.key==='Enter'){ e.preventDefault(); press('='); }
    else if(e.key==='Backspace'){ press('back'); }
    else if(e.key==='Escape'){ press('C'); }
  });
  document.getElementById('stdClearHist').addEventListener('click', ()=>{ Store.clearHistory(); toast('History cleared'); });
  document.getElementById('stdExport').addEventListener('click', ()=>{ downloadText('calcura-history.json', JSON.stringify(Store.data.history,null,2), 'application/json'); toast('History exported'); });
  document.getElementById('stdImport').addEventListener('change', (e)=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{ const arr = JSON.parse(reader.result); if(Array.isArray(arr)){ Store.data.history = arr.concat(Store.data.history).slice(0,300); Store.save(); renderHistory(); toast('History imported'); } }
      catch(err){ toast('Invalid file','error'); }
    };
    reader.readAsText(file);
  });
  updateDisplay(); syncMem();
  return {press};
})();

      <button class="key fn" data-k="pi">π</button><button class="key fn" data-k="e">e</button><button class="key fn" data-k="sqrt(">√</button><button class="key fn" data-k="cbrt(">∛</button><button class="key fn" data-k="^">xʸ</button>

      <button class="key wide" data-k="0">0</button><button class="key" data-k=".">.</button><button class="key op" data-k="+">+</button><button class="key eq" data-k="=">=</button>
    </div>
  </div>
  <div class="card history-panel">
    <h2>Result Detail</h2>
    <div id="sciDetail" class="empty-note">Evaluate an expression to see details</div>
  </div>
</div>
`);
const Sci = (()=>{
  let expr='', mode='deg', autoNotation=true;
  const exprEl=()=>document.getElementById('sciExpr'), valEl=()=>document.getElementById('sciVal');
  function fmtSci(n){
    if(!isFinite(n)) return n>0?'Infinity':'-Infinity';
    if(autoNotation && (Math.abs(n)>=1e9 || (Math.abs(n)<1e-6 && n!==0))) return n.toExponential(6);
    return String(Math.round(n*1e10)/1e10);
  }
  function updateDisplay(){
    exprEl().textContent = expr || '\u00A0';
    const r = MathEngine.evaluate(expr, mode);
    valEl().textContent = expr ? (isNaN(r)?'Error':fmtSci(r)) : '0';
  }
  function press(k){
    if(k==='C'){ expr=''; updateDisplay(); return; }
    if(k==='back'){ expr=expr.slice(0,-1); updateDisplay(); return; }
    if(k==='rand'){ expr += Math.random().toFixed(6); updateDisplay(); return; }
    if(k==='fact'){ expr += '!'; updateDisplay(); return; }
    if(k==='='){
      if(!expr) return;
      const r = MathEngine.evaluate(expr, mode);
      if(isNaN(r)){ valEl().textContent='Error'; return; }
      Store.addHistory({label:'Scientific ('+mode+')', expr, result: fmtSci(r)});
      document.getElementById('sciDetail').innerHTML = `
        <div class="summary-table">
          <tr><td>Expression</td><td>${expr}</td></tr>
          <tr><td>Result</td><td>${fmtSci(r)}</td></tr>
          <tr><td>Mode</td><td>${mode.toUpperCase()}</td></tr>
          <tr><td>Scientific Notation</td><td>${r.toExponential(6)}</td></tr>
        </div>`;
      expr = fmtSci(r); updateDisplay(); return;
    }
    expr += k; updateDisplay();
  }
  document.getElementById('view-scientific').addEventListener('click', e=>{
    const btn = e.target.closest('.key'); if(btn){ press(btn.dataset.k); return; }
    const pill = e.target.closest('.pill');
    if(pill){ mode = pill.dataset.mode; $$('#angleMode .pill').forEach(p=>p.classList.remove('active')); pill.classList.add('active'); updateDisplay(); }
  });
  document.getElementById('sciNotToggleWrap').addEventListener('click', ()=>{
    autoNotation = !autoNotation;
    document.getElementById('sciNotState').textContent = autoNotation?'Auto':'Fixed';
    updateDisplay();
  });
  document.addEventListener('keydown', e=>{
    if(currentView!=='scientific') return;
    if(/[0-9.+\-*/()%]/.test(e.key)) press(e.key);
    else if(e.key==='Enter'){ e.preventDefault(); press('='); }
    else if(e.key==='Backspace') press('back');
    else if(e.key==='Escape') press('C');
  });
  updateDisplay();
  return {press};
})();

function financialCardShell(id, title, formHtml, resultId){
  return makeView(id, `
  <div class="grid cols-2">
    <div class="card">
      <h2>${title}</h2>
      ${formHtml}
    </div>
    <div class="card">
      <h2>Summary</h2>
      <div id="${resultId}"><div class="empty-note">Enter values to see results</div></div>
      <canvas class="chart" id="${resultId}-chart"></canvas>
      <button class="btn secondary block" style="margin-top:12px;" id="${resultId}-download">Download Summary (.txt)</button>
    </div>
  </div>`);
}
function bindLiveInputs(viewId, calcFn){
  const view = document.getElementById('view-'+viewId);
  view.addEventListener('input', ()=>{
    view.querySelectorAll('input[type=range]').forEach(r=>{
      const out = view.querySelector('#'+r.id+'-out'); if(out) out.textContent = r.value;
      const twin = view.querySelector('#'+r.id+'-num'); if(twin && document.activeElement!==twin) twin.value = r.value;
    });
    view.querySelectorAll('.num-for-range').forEach(n=>{
      const range = view.querySelector('#'+n.dataset.range); if(range && document.activeElement===n) range.value = n.value;
    });
    calcFn();
  });
  calcFn();
}
function sliderField(id,label,min,max,step,val,suffix=''){
  return `<div class="field"><label>${label}: <b><span id="${id}-out">${val}</span>${suffix}</b></label>
    <input type="range" id="${id}" min="${min}" max="${max}" step="${step}" value="${val}"></div>`;
}
function downloadSummaryBtn(btnId, titleGetter, linesGetter){
  document.getElementById(btnId).addEventListener('click', ()=>{
    const lines = linesGetter();
    if(!lines) { toast('Nothing to export yet','error'); return; }
    downloadText(titleGetter().replace(/\s+/g,'_')+'.txt', lines);
    toast('Summary downloaded');
  });
}

const UNIT_GROUPS = {
  length:{base:'m', units:{m:1, km:1000, cm:0.01, mm:0.001, mi:1609.344, yd:0.9144, ft:0.3048, 'in':0.0254, nmi:1852}},
  weight:{base:'kg', units:{kg:1, g:0.001, mg:0.000001, lb:0.45359237, oz:0.0283495231, ton:1000, stone:6.35029}},

  volume:{base:'L', units:{'L':1,'mL':0.001,'m³':1000,'gal (US)':3.785411784,'qt':0.946352946,'cup':0.2365882365,'fl oz':0.0295735296,'tbsp':0.0147867648,'tsp':0.00492892159}},
  speed:{base:'m/s', units:{'m/s':1,'km/h':0.277778,'mph':0.44704,'knot':0.514444,'ft/s':0.3048}},
  time:{base:'s', units:{s:1,min:60,hr:3600,day:86400,week:604800,month:2629800,year:31557600,ms:0.001}},
  pressure:{base:'Pa', units:{'Pa':1,'kPa':1000,'bar':100000,'atm':101325,'psi':6894.757293168,'mmHg':133.322387415}},
  energy:{base:'J', units:{'J':1,'kJ':1000,'cal':4.184,'kcal':4184,'Wh':3600,'kWh':3600000,'BTU':1055.05585262}},
  power:{base:'W', units:{'W':1,'kW':1000,'MW':1000000,'hp':745.699872,'BTU/h':0.29307107}},
  freq:{base:'Hz', units:{'Hz':1,'kHz':1000,'MHz':1000000,'GHz':1000000000,'rpm':0.0166667}},
  data:{base:'byte', units:{bit:0.125, byte:1, KB:1024, MB:1048576, GB:1073741824, TB:1099511627776, Kb:128, Mb:131072, Gb:134217728}},
  angle:{base:'deg', units:{deg:1, rad:57.29577951308232, grad:0.9, arcmin:1/60, arcsec:1/3600}},
};
function genericConverterView(id, title, groupKey){
  const g = UNIT_GROUPS[groupKey];
  const opts = Object.keys(g.units).map(u=>`<option value="${u}">${u}</option>`).join('');
  makeView(id, `
  <div class="card">
    <h2>${title} Converter</h2>
    <div class="conv-io">
      <div class="field"><label>From</label><select class="input" id="${id}-from">${opts}</select><input class="input" style="margin-top:8px;" id="${id}-val" type="text" inputmode="decimal" value="1"></div>
      <button class="conv-swap" id="${id}-swap" title="Swap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 7h13l-4-4M17 17H4l4 4"/></svg></button>
      <div class="field"><label>To</label><select class="input" id="${id}-to">${opts}</select><input class="input" style="margin-top:8px;" id="${id}-out" type="text" readonly></div>
    </div>
    <div id="${id}-all" style="margin-top:16px;"></div>
  </div>`);
  const from = document.getElementById(id+'-from'), to = document.getElementById(id+'-to'), val = document.getElementById(id+'-val'), out = document.getElementById(id+'-out');
  const keys = Object.keys(g.units); to.value = keys[1]||keys[0];
  function compute(){
    const v = parseFloat(val.value); const outAll = document.getElementById(id+'-all');
    if(isNaN(v)){ out.value=''; outAll.innerHTML='<div class="empty-note">Enter a value</div>'; return; }
    let base;
    if(groupKey==='temperature') base = tempToBase(v, from.value);
    else base = v*g.units[from.value];
    let result;
    if(groupKey==='temperature') result = tempFromBase(base, to.value);
    else result = base/g.units[to.value];
    out.value = trimNumber(result);
    outAll.innerHTML = '<table class="summary-table">'+keys.map(k=>{
      let r = groupKey==='temperature' ? tempFromBase(base,k) : base/g.units[k];
      return `<tr><td>${k}</td><td>${trimNumber(r)}</td></tr>`;
    }).join('')+'</table>';
  }
  function trimNumber(n){ if(!isFinite(n)) return '—'; return Math.abs(n)>=1e6||Math.abs(n)<1e-4&&n!==0 ? n.toExponential(4) : (Math.round(n*1e6)/1e6).toLocaleString(undefined,{maximumFractionDigits:6}); }
  [from,to,val].forEach(el=>el.addEventListener('input', compute));
  document.getElementById(id+'-swap').addEventListener('click', ()=>{ const f=from.value; from.value=to.value; to.value=f; compute(); });
  compute();
}
/* Temperature special-case */
function tempToBase(v,unit){ if(unit==='°C') return v; if(unit==='°F') return (v-32)*5/9; if(unit==='K') return v-273.15; return v; }
function tempFromBase(c,unit){ if(unit==='°C') return c; if(unit==='°F') return c*9/5+32; if(unit==='K') return c+273.15; return c; }
function temperatureView(){
  makeView('conv-temp', `
  <div class="card">
    <h2>Temperature Converter</h2>
    <div class="conv-io">
      <div class="field"><label>From</label><select class="input" id="temp-from"><option>°C</option><option>°F</option><option>K</option></select><input class="input" style="margin-top:8px;" id="temp-val" type="text" inputmode="decimal" value="25"></div>
      <button class="conv-swap" id="temp-swap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 7h13l-4-4M17 17H4l4 4"/></svg></button>
      <div class="field"><label>To</label><select class="input" id="temp-to"><option>°C</option><option selected>°F</option><option>K</option></select><input class="input" style="margin-top:8px;" id="temp-out" readonly></div>
    </div>
    <div id="temp-all" style="margin-top:16px;"></div>
  </div>`);
  const from=document.getElementById('temp-from'), to=document.getElementById('temp-to'), val=document.getElementById('temp-val'), out=document.getElementById('temp-out');
  function compute(){
    const v=parseFloat(val.value); if(isNaN(v)){ out.value=''; return; }
    const c = tempToBase(v, from.value);
    out.value = fmt(tempFromBase(c, to.value),2);
    document.getElementById('temp-all').innerHTML = `<table class="summary-table"><tr><td>°C</td><td>${fmt(tempFromBase(c,'°C'),2)}</td></tr><tr><td>°F</td><td>${fmt(tempFromBase(c,'°F'),2)}</td></tr><tr><td>K</td><td>${fmt(tempFromBase(c,'K'),2)}</td></tr></table>`;
  }
  [from,to,val].forEach(el=>el.addEventListener('input',compute));
  document.getElementById('temp-swap').addEventListener('click',()=>{ const f=from.value; from.value=to.value; to.value=f; compute(); });
  compute();
}

(function(){
  const KML_PER_MPG = 0.425144;
  function toKmL(v,unit){ if(unit==='kml') return v; if(unit==='mpg') return v*KML_PER_MPG; if(unit==='l100') return 100/v; }
  function fromKmL(kml,unit){ if(unit==='kml') return kml; if(unit==='mpg') return kml/KML_PER_MPG; if(unit==='l100') return 100/kml; }
  const from=document.getElementById('fuel-from'),to=document.getElementById('fuel-to'),val=document.getElementById('fuel-val'),out=document.getElementById('fuel-out');
  function compute(){
    const v=parseFloat(val.value); if(isNaN(v)||v===0){ out.value=''; return; }
    const kml = toKmL(v, from.value);
    out.value = fmt(fromKmL(kml, to.value),2);
    document.getElementById('fuel-all').innerHTML = `<table class="summary-table"><tr><td>mpg (US)</td><td>${fmt(fromKmL(kml,'mpg'),2)}</td></tr><tr><td>km/L</td><td>${fmt(fromKmL(kml,'kml'),2)}</td></tr><tr><td>L/100km</td><td>${fmt(fromKmL(kml,'l100'),2)}</td></tr></table>`;
  }
  [from,to,val].forEach(el=>el.addEventListener('input',compute));
  document.getElementById('fuel-swap').addEventListener('click',()=>{ const f=from.value; from.value=to.value; to.value=f; compute(); });
  compute();
})();

/* =====================================================================================
   13. CURRENCY CONVERTER (offline, editable rate table)
===================================================================================== */
const DEFAULT_RATES = { USD:1, EUR:0.92, GBP:0.79, JPY:156.2, INR:83.4, AUD:1.52, CAD:1.36, CHF:0.90, CNY:7.24, SGD:1.35, AED:3.67, ZAR:18.4, BRL:5.4, RUB:92.5, KRW:1365, MXN:18.1, NZD:1.65, SEK:10.5, NOK:10.9, HKD:7.82 };
if(!Store.data.currencyRates) Store.data.currencyRates = {...DEFAULT_RATES};
const RATES = Store.data.currencyRates;

makeView('currency', `
<div class="grid cols-2">
  <div class="card">
    <h2>Currency Converter</h2>
    <div class="conv-io">
      <div class="field"><label>Amount</label><input class="input" id="curAmt" type="text" inputmode="decimal" value="100">
      <select class="input" style="margin-top:8px;" id="curFrom"></select></div>
      <button class="conv-swap" id="curSwap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 7h13l-4-4M17 17H4l4 4"/></svg></button>
      <div class="field"><label>Converted</label><input class="input" id="curOut" readonly>
      <select class="input" style="margin-top:8px;" id="curTo"></select></div>
    </div>
    <div class="result-box" id="curResultBox" style="margin-top:14px;"></div>
    <p style="font-size:11.5px;color:var(--text-dim);margin-top:10px;">Rates are stored locally and offline (relative to USD). Edit them in the table for your own reference values →</p>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h2 style="margin:0;">Exchange Rate Table (per USD)</h2>
      <button class="btn secondary small" id="curReset">Reset</button>
    </div>
    <div class="search-box" style="margin-top:12px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg><input id="curSearch" placeholder="Search currency…"></div>
    <div class="currency-list" id="curList"></div>
  </div>
</div>`);
(function(){
  const fromSel=document.getElementById('curFrom'), toSel=document.getElementById('curTo'), amt=document.getElementById('curAmt'), out=document.getElementById('curOut');
  function codes(){ return Object.keys(RATES); }
  function fillSelects(){
    const opts = codes().map(c=>`<option value="${c}">${c}</option>`).join('');
    fromSel.innerHTML = opts; toSel.innerHTML = opts;
    fromSel.value='USD'; toSel.value = codes().includes('INR')?'INR':codes()[1];
  }
  function compute(){
    const v = parseFloat(amt.value); if(isNaN(v)){ out.value=''; return; }
    const usd = v/RATES[fromSel.value];
    const result = usd*RATES[toSel.value];
    out.value = fmt(result,2);
    document.getElementById('curResultBox').innerHTML = `<div class="big">${fmt(v,2)} ${fromSel.value} = ${fmt(result,2)} ${toSel.value}</div><div class="cap">1 ${fromSel.value} = ${fmt(RATES[toSel.value]/RATES[fromSel.value],4)} ${toSel.value}</div>`;
  }
  [fromSel,toSel,amt].forEach(el=>el.addEventListener('input',compute));
  document.getElementById('curSwap').addEventListener('click',()=>{ const f=fromSel.value; fromSel.value=toSel.value; toSel.value=f; compute(); });

  function renderList(filter=''){
    const list = document.getElementById('curList');
    const f = filter.toLowerCase();
    list.innerHTML = codes().filter(c=>c.toLowerCase().includes(f)).map(c=>{
      const fav = Store.data.favorites.includes('cur-'+c);
      return `<div class="currency-row"><span class="code">${c}</span><input class="rate" type="text" data-code="${c}" value="${RATES[c]}">
      <svg class="fav ${fav?'on':''}" data-favc="${c}" viewBox="0 0 24 24" fill="${fav?'currentColor':'none'}" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M12 2l3.1 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.8 21l1.2-6.8-5-4.9 6.9-1z"/></svg></div>`;
    }).join('');
    $$('#curList .rate').forEach(inp=>{
      inp.addEventListener('change', ()=>{
        const v = parseFloat(inp.value); if(!isNaN(v)&&v>0){ RATES[inp.dataset.code]=v; Store.save(); compute(); toast('Rate updated'); }
      });
    });
    $$('#curList .fav').forEach(f=>{
      f.addEventListener('click', ()=>{ Store.toggleFavorite('cur-'+f.dataset.favc); renderList(document.getElementById('curSearch').value); });
    });
  }
  document.getElementById('curSearch').addEventListener('input', e=>renderList(e.target.value));
  document.getElementById('curReset').addEventListener('click', ()=>{
    Object.assign(RATES, DEFAULT_RATES); Store.save(); renderList(); compute(); toast('Rates reset to default');
  });
  fillSelects(); renderList(); compute();
})();

   14. INITIAL BOOT
===================================================================================== */
renderNav();
navigateTo('standard');
rippleAll(document);
new MutationObserver(()=>rippleAll(document)).observe(viewsRoot,{childList:true,subtree:true});
renderHistory();
</script>
